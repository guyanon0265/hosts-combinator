name: Daily Hosts Update

on:
  schedule:
    # 1PM EST = 18:00 UTC (accounts for EST = UTC-5)
    # During EDT (summer), 1PM EDT = 17:00 UTC — adjust the cron below if needed.
    - cron: "0 18 * * *"
  workflow_dispatch: # Allow manual trigger from the Actions tab

jobs:
  update:
    name: Update hosts, create raw urls list and sqlite db
    runs-on: ubuntu-latest

    permissions:
      contents: write # Needed to commit updated files back to the repo

    steps:
      - name: Check repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          
      - name: Restore hash cache
        uses: actions/cache@v4
        with:
          path: lists/.cache
          key: hosts-cache-${{ runner.os }}
          restore-keys: hosts-cache-
          
      - name: Run combinator.py
        run: python3 scripts/combinator.py

      - name: Run rawurls.py to create urls list
        run: python3 scripts/rawurls.py

      - name: Run sqlite.py to store URLs in SQLite database
        run: python3 scripts/sqlite.py

      - name: Commit updated files
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add lists/hosts lists/urls sqlite/blockedurls.sqlite3 sqlite/dbversion.txt
          # Only commit if something actually changed
          git diff --cached --quiet || git commit -m "chore: daily hosts update $(date -u '+%Y-%m-%d')"
          git push
