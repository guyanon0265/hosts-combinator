name: Daily Hosts Update

on:
  schedule:
    # 1PM EST = 18:00 UTC (accounts for EST = UTC-5)
    # During EDT (summer), 1PM EDT = 17:00 UTC — adjust the cron below if needed.
    - cron: "0 18 * * *"
  workflow_dispatch: # Allow manual trigger from the Actions tab

jobs:
  update:
    name: Update hosts, create raw urls list and sqlite db
    runs-on: ubuntu-latest

    permissions:
      contents: write # Needed to commit updated files back to the repo

    steps:
      - name: Check repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          
      - name: Run combinator.py
        run: python3 scripts/combinator.py

      - name: Check if hosts changed
        id: diff
        run: |
          git diff --quiet lists/hosts || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Run rawurls.py to create urls list
        if: steps.diff.outputs.changed == 'true'
        run: python3 scripts/rawurls.py

      - name: Run sqlite.py to store URLs in SQLite database
        if: steps.diff.outputs.changed == 'true'
        run: python3 scripts/sqlite.py

      - name: Run compressor.py to create compressedhosts
        if: steps.diff.outputs.changed == 'true'
        run: python3 scripts/compressor.py

      - name: Commit updated files
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add lists/hosts lists/urls lists/compressedhosts sqlite/blockedurls.sqlite3 sqlite/dbversion.txt source_hashes.json
          # Only commit if something actually changed
          git diff --cached --quiet || git commit -m "chore: daily hosts update $(date -u '+%Y-%m-%d')"
          git push

      - name: Purge jsDelivr CDN cache
        if: steps.diff.outputs.changed == 'true'
        run: |
          curl -s "https://purge.jsdelivr.net/gh/guyanon0265/hosts-combinator@main/lists/hosts"
          curl -s "https://purge.jsdelivr.net/gh/guyanon0265/hosts-combinator@main/lists/compressedhosts"
          curl -s "https://purge.jsdelivr.net/gh/guyanon0265/hosts-combinator@main/sqlite/blockedurls.sqlite3"
          curl -s "https://purge.jsdelivr.net/gh/guyanon0265/hosts-combinator@main/sqlite/dbversion.txt"
